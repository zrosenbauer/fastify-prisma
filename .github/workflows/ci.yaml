name: "ci: Code Standards & Testing"

on:
  pull_request: {}
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Continuous Integration Suite
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: "⬇️ Checkout Code"
        uses: actions/checkout@v6
      - name: "📦 Setup pnpm"
        uses: pnpm/action-setup@v4
      - name: "💚 Use Node.js v24"
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
      - name: "📦 Install Packages"
        run: pnpm install --frozen-lockfile
      - name: "🎨 Code Formatting & Linting"
        run: pnpm analyze:ci
      - name: "🟦 Typecheck"
        run: pnpm analyze:types
      - name: "▲ Generate Prisma Client for Tests"
        run: pnpm prisma:generate
      - name: "⚡️ Test"
        id: test
        run: pnpm test run

  dependabot:
    name: "Dependabot (auto-approve + auto-merge)"
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 5
    if: ${{ github.actor == 'dependabot[bot]' && github.event_name == 'pull_request' }}
    steps:
      # Branch protection on `main` requires an approving review. The GH_BOT_TOKEN
      # belongs to a different identity than dependabot[bot], so it can approve.
      - name: Auto-approve
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
