name: 'pkgs: Release'

on:
  push:
    branches:
      - main
  # Manual trigger for the publish step after merging a Version Packages PR.
  # Merges authored by the workflow's GITHUB_TOKEN don't re-trigger workflows,
  # so this is the supported way to kick off the publish leg.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Trusted publishing handles npm auth via OIDC (id-token: write).
    # contents: write lets changesets/action push the Version Packages PR branch and create GitHub releases.
    # pull-requests: write lets it open/update the Version Packages PR.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: '🛒 Checkout Code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: '🟢 Use Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      # npm trusted publishing (OIDC) requires npm >= 11.5.1.
      # Node 22 ships an older npm, so install the latest.
      - name: '🆕 Upgrade npm (>= 11.5.1 for OIDC)'
        run: npm install -g npm@latest

      - name: '📦 Install Packages'
        run: yarn --immutable --immutable-cache --check-cache

      - name: '🏗️ Build'
        run: yarn build

      # If there are unconsumed changesets, this opens/updates a "Version Packages" PR.
      # If there are none (the Version Packages PR was just merged), it runs the publish
      # script, which publishes to npm via trusted publishing — no npm token needed.
      #
      # `yarn run` is used to invoke our scripts rather than `yarn version`/`yarn publish`,
      # which collide with Yarn 4 built-in commands.
      - name: '🚀 Create Release PR or Publish'
        uses: changesets/action@v1
        with:
          version: yarn run version
          publish: yarn run publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
